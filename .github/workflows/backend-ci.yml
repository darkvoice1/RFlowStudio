name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    steps:
      # 拉取仓库代码，供后续安装依赖和执行检查。
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安装与本地开发一致的 Python 版本，减少环境差异。
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 升级 pip，避免旧版本在解析现代 pyproject 时出现兼容问题。
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # 以可编辑模式安装后端及开发依赖，保证 pytest 和 ruff 可用。
      - name: Install backend dependencies
        run: python -m pip install -e "./backend[dev]"

      # 先做静态检查，尽早发现导入顺序和语法类问题。
      - name: Run Ruff
        run: python -m ruff check backend

      # 再执行后端测试，验证当前数据接入链路和接口行为。
      - name: Run Pytest
        run: python -m pytest backend/tests -q
